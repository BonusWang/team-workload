image: registry.minshenglife.com/taichi/cibase:1.0

stages:
  - build_backend
  - build_frontend
  - release

variables:
  DOCKER_REGISTRY: registry.minshenglife.com
  GROUP_NAME: teamworkload
  PROJECT_NAME: team-workload

build_backend:
  stage: build_backend
  script:
    - cp settings.xml server/settings.xml
    - cd server
    - update_pom_version true
    - mvn package -U -DskipTests=true -s settings.xml
    - docker_build
  only:
    - master
    - mysqldev
    - mysqlsit
    - mysqluat
    - pgUAT
    - stg
    - master_stg
    - master-stgv1
    - /^release-.*$/
    - /^hotfix-.*$/

build_frontend:
  stage: build_frontend
  script:
    - cd web
    - docker login -u ${DOCKER_USER} -p ${DOCKER_PWD} ${DOCKER_REGISTRY}
    - docker build -t ${DOCKER_REGISTRY}/${GROUP_NAME}/${PROJECT_NAME}-web:${CI_COMMIT_TAG} -f Dockerfile .
    - docker push ${DOCKER_REGISTRY}/${GROUP_NAME}/${PROJECT_NAME}-web:${CI_COMMIT_TAG}
  only:
    - master
    - mysqldev
    - mysqlsit
    - mysqluat
    - pgUAT
    - stg
    - master_stg
    - master-stgv1
    - /^release-.*$/
    - /^hotfix-.*$/

release:
  stage: release
  script:
    - chart_build
  only:
    - master
    - mysqldev
    - mysqlsit
    - mysqluat
    - pgUAT
    - stg
    - master_stg
    - master-stgv1
    - /^release-.*$/
    - /^hotfix-.*$/

.auto_devops: &auto_devops |
  http_status_code=`curl -o .auto_devops.sh -s -m 10 --connect-timeout 10 -w %{http_code} "${CHOERODON_URL}/devops/ci?token=${Token}&type=microservice"`
  if [ "$http_status_code" != "200" ]; then
    cat .auto_devops.sh
    exit 1
  fi
  source .auto_devops.sh
  function docker_build(){
      docker login -u ${DOCKER_USER} -p ${DOCKER_PWD} ${DOCKER_REGISTRY}
      docker build -t ${DOCKER_REGISTRY}/${GROUP_NAME}/${PROJECT_NAME}-server:${CI_COMMIT_TAG} -f Dockerfile .
      docker push ${DOCKER_REGISTRY}/${GROUP_NAME}/${PROJECT_NAME}-server:${CI_COMMIT_TAG}
  }

before_script:
  - *auto_devops
