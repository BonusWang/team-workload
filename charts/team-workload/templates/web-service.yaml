apiVersion: v1
kind: Service
metadata:
  name: {{ include "team-workload.fullname" . }}-web
  labels:
    {{- include "team-workload.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if eq .Values.service.web.type "NodePort" }}
      nodePort: {{ .Values.service.web.nodePort }}
      {{- end }}
  selector:
    {{- include "team-workload.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
