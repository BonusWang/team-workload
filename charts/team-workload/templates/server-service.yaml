apiVersion: v1
kind: Service
metadata:
  name: {{ include "team-workload.fullname" . }}-server
  labels:
    {{- include "team-workload.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.server.type }}
  ports:
    - port: {{ .Values.service.server.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "team-workload.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
