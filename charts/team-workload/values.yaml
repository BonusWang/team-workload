# Default values for team-workload.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  server:
    repository: registry.minshenglife.com/teamworkload/team-workload-server
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    version: "1.0.0"
  web:
    repository: registry.minshenglife.com/teamworkload/team-workload-web
    pullPolicy: IfNotPresent
    version: "1.0.0"

imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  server:
    type: ClusterIP
    port: 8080
  web:
    type: NodePort
    port: 3000
    nodePort: 30080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

tolerations: []

affinity: {}

# MySQL Database Configuration
mysql:
  enabled: true
  rootPassword: "your-root-password"
  database: "team_workload"
  username: "root"
  password: "your-root-password"
  host: "team-workload-mysql"
  port: 3306

# Application Configuration
app:
  server:
    port: 8080
    jwtSecret: "TeamWorkloadSecretKey2024ForJwtTokenGenerationAndValidation"
  web:
    port: 3000
